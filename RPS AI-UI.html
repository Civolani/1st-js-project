<!DOCTYPE html>


<html>

<style>
    
    #title {
        font-size: 30px;
        font-weight: bold;
    }

    #description {
        margin-bottom: 25px;
        margin-top: 28px;
        font-size: 21.5px;
    }

    #cpu-choice {
        width: 80px
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 50vh;
        font-family: system-ui;
    }

    button {
        transition: box-shadow 0.2s ease-in-out;
    }

    button:hover {
        box-shadow: 0 0 5px rgba(133, 133, 133, 0.242);
    }

    #shoot:hover {
        box-shadow: 0 0 10px rgba(254, 0, 0, 0.343);
       
    }

    #userchoices {
        display: flex;
        flex-direction: row;
        gap: 5px;
        margin-bottom: 5px;
    }

    #cpu {
        display: flex;
        flex-direction: row;
        gap: 7px;
    }

    .weapon {
        border-radius: 10px;
        font-size: 15px;
        border: 1px solid rgb(144, 144, 144);
        padding-bottom: 7px;
        padding-top: 7px;
        padding-left: 15px;
        padding-right: 15px;
        cursor: pointer;
    }

    .selected {
        box-shadow: 0 0 10px rgba(128, 128, 128, 0.575) !important;   
    }

    #shoot {
        font-size: 20px;
        border-radius: 12px;
        border: 1px solid rgb(144, 144, 144);
        cursor: pointer;
        padding: 1.5%;
        padding-left: 25px;
        padding-right: 25px;
    }
</style>


<head>

    <title>RPS</title>

</head>


<body>
    <p id="title">Rock Paper Scissors</p>

    <p id="description">Choose your weapon</p>

    <div></div>

    <div id="userchoices">
    <button id="rock" class="weapon">Rock</button>
    <button id="paper" class="weapon">Paper</button>
    <button id="scissors" class="weapon">Scissors</button>
    </div>

    <br><br>

    <div id="cpu">
        <p id="cpu-title" style="font-size: 22px"> 🤖 CPU:</p>
        <p id="cpu-choice" style="font-size: 22px">Rock</p>
    </div>

    <br> <br>

    <button id="shoot">Shoot!</button>

    <br>
    
    <div id="outcome"></div>

    <script src="RPS.js"></script>
</body>
</html>
