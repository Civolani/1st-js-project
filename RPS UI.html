<!DOCTYPE html>


<html>

<style>
    
    #title {
        font-size: 30px;
        font-weight: bold;
    }

    #description {
        margin-bottom: 25px;
        margin-top: 28px;
        font-size: 21.5px;
    }

    #cpu-choice {
        width: 80px;
        text-align: center;
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 50vh;
        font-family: system-ui;
    }

    button {
        transition: box-shadow 0.2s ease-in-out;
    }

    button:hover {
        box-shadow: 0 0 5px rgba(133, 133, 133, 0.242);
    }

    #shoot:hover {
        box-shadow: 0 0 10px rgba(156, 156, 156, 0.343);
       
    }

    #userchoices {
        display: flex;
        flex-direction: row;
        gap: 5px;
        margin-bottom: 5px;
    }

    #cpu {
        display: flex;
        flex-direction: row;
        gap: 7px;
        border: 1.5px, solid rgb(194, 194, 194);
        padding-left: 25px;
        padding-right: 25px;
        border-radius: 10px;
        background-color: rgb(236, 236, 255);
    }

    .weapon {
        border-radius: 10px;
        font-size: 18px;
        border: 1px solid rgb(144, 144, 144);
        padding-bottom: 7px;
        padding-top: 7px;
        padding-left: 15px;
        padding-right: 15px;
        cursor: pointer;
    }

    .selected {
        box-shadow: 0 0 10px rgba(128, 128, 128, 0.575) !important;   
    }

    #shoot {
        font-size: 20px;
        border-radius: 12px;
        border: 1px solid rgb(144, 144, 144);
        cursor: pointer;
        padding: 1.5%;
        padding-left: 25px;
        padding-right: 25px;
        padding-top: 15px;
        padding-bottom: 15px;
    }

    #outcomedisplay {
        font-size: 25px;
        margin-top: 10px;
        font-weight: 600;
    }

    .victorycolor {
        color: green
    }

    .defeatcolor {
        color: red
    }

    .tiecolor {
        color: gray
    }
    
    .weaponunselected {
        font-weight: 400 !important;
        font-size: 20px !important;
    }
</style>


<head>

    <title>RPS</title>

</head>


<body>
    <p id="title">Rock Paper Scissors</p>

    <p id="description">Choose your weapon</p>

    <div></div>

    <div id="userchoices">
    <button id="3" class="weapon">Rock</button>
    <button id="1" class="weapon">Paper</button>
    <button id="2" class="weapon">Scissors</button>
    </div>

    <br><br>

    <div id="cpu">
        <p id="cpu-title" style="font-size: 20px"> 🤖 CPU:</p>
        <p id="cpu-choice" style="font-size: 20px">Rock</p>
    </div>

    <br> <br>

    <button id="shoot">Shoot!</button>

    <br>
    
    <div id="outcomedisplay"></div>

    <script src="RPS.js"></script>
</body>
</html>
