<!DOCTYPE html>

<head>

</head>

<style>

    
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-image: linear-gradient(to right top, #00c8ff, #00cdfb, #00d1f7, #00d5f1, #12d9eb);
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
        height: 100vh;
        margin: 0;
        font-family: system-ui;
    }

    #main-window {
        background-color: white;
        padding: 25px;
        border-radius: 20px;
        justify-content: center;
        align-items: center;
    }

    #add-button {
       border-radius: 50%; 
       border: none;
       background-color: rgb(255, 86, 86);
       font-style: bold;
       color: white;
       font-size: 40px;
       height: 55px;
       width: 55px;
       cursor: pointer;
    }

    #new-item {
        border-radius: 15px;
        background-color: rgb(218, 218, 218);
        border: 0px;
        padding: 7px;
        padding-right: 0px;
        font-size: 22px;
        padding-left: 15px;
        margin-left: 10px;
        width: 370px;
        height: 35px;
    }

    #list-header {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    input[type="checkbox"] {
        appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid gray;
        cursor: pointer
    }

    input[type='checkbox']:checked {
        background-color: rgb(75, 75, 75);
    }

    ul {
        list-style-type: none;
    }

    li {
        display: flex;
        align-items: center;
        margin-left: -27.5px;
    }

    .checked {
        text-decoration: line-through;
        color: rgb(80, 80, 80);
    }

    #removebutton {
        background-color: transparent;
        border: 0px;
        font-style: bold;
        color: rgb(192, 0, 0);
        cursor: pointer;
        margin-left: auto;
        font-size: 20px;
    }

</style>

<body>
<div id="main-window">

    <div id="list-header">

     <button id="add-button">+</button>
     <input type="text" id="new-item" placeholder="Add a task...">

    </div>   


    <div style="align-self: flex-start">

     <ul id="list">
     <li><input type="checkbox" id="listcheckbox" style=margin-right:10px>Walk the dog<button id="removebutton">━</button></li>  
     </ul>

    </div>

</div>


<button onclick="location.reload()" style="
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
">↻</button>

<script src='To-Do List.js'></script>
</body>
