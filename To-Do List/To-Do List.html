<!DOCTYPE html>

<head>

</head>

<style>

    
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-image: linear-gradient(to right top, #00c8ff, #00cdfb, #00d1f7, #00d5f1, #12d9eb);
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
        height: 100vh;
        margin: 0;
    }

    #main-window {
        background-color: white;
        padding: 25px;
        border-radius: 20px;
        justify-content: center;
        align-items: center;
    }

    #add-button {
       border-radius: 50%; 
       border: none;
       background-color: rgb(255, 86, 86);
       font-style: bold;
       color: white;
       font-size: 40px;
       height: 60px;
       width: 60px;
    }

    #new-item {
        border-radius: 5px;
        background-color: rgb(218, 218, 218);
        border: 0px;
        padding: 7px;
        padding-right: 0px;
        font-size: 30px;

    }

    #list-header {
        justify-content: center;
        align-items: center;
    }

</style>

<body>
<div id="main-window">

    <div id="list-header">
    <button id="add-button">+</button>
    <input type="text" id="new-item" placeholder="Add a task...">
    </div>   

    <div style="align-self: flex-start">
    <ul id="list">
        <li></li>
        
    </ul>
    </div>

</div>


<button onclick="location.reload()" style="
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
">↻</button>

</body>
